                        ⟳

                    <nav class="header-nav">
                        <a href="home.html" class="header-link">Home</a>

                            <span class="hamburger-line"></span>
                            <span class="hamburger-line"></span>
                            <span class="sr-only">Toggle Sidebar</span>
                        </button>
                        <button id="toggle-bottom" title="Show / Hide bottom controls" aria-label="Toggle bottom controls" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.2);padding:6px 8px;border-radius:6px;cursor:pointer;font-weight:600;">
                            👁
                        </button>
                    </div>
                </div>
            </header>
            
            <div class="fretboard-container">

                    <!-- populated by App.updateFretboard() -->
                </div>
            </div>
            
            <div class="slideshow-container">
                <div id="slideshow-items"></div>
            </div>
            
            <div class="pattern-generator">
